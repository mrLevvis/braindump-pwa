name: Supabase Migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Migrations 005-017 wurden manuell im Supabase-Editor ausgeführt und
      # fehlen in der CLI-Migrationshistorie. Einmalig per SQL nachtragen.
      - name: Repair migration history
        run: |
          supabase db execute --sql "
            INSERT INTO supabase_migrations.schema_migrations (version) VALUES
              ('005_complete_task_only'),
              ('006_enable_rls'),
              ('007_add_shopping_items'),
              ('008_scope_entries_by_user'),
              ('009_add_issues'),
              ('010_add_shopping_estimated_price'),
              ('011_add_recurrence'),
              ('012_recurrence_exceptions'),
              ('013_issue_screenshots'),
              ('014_add_shopping_deadline'),
              ('015_add_depends_on'),
              ('016_shopping_price_history_index'),
              ('017_add_shopping_notes')
            ON CONFLICT DO NOTHING;
          "
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - run: supabase db push --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
